<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>TapLink</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="/src/assets/taplink-mark.svg" />
    <link rel="alternate icon" href="/src/assets/taplink-mark.svg" />
    <link rel="shortcut icon" href="/src/assets/taplink-mark.svg" />
    <link rel="apple-touch-icon" href="/src/assets/taplink-mark.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        font-family: 'Manrope', sans-serif;
        background: #000000;
        color: #f5f7fa;
      }

      #root {
        min-height: 100vh;
        background: #000000;
      }

      .boot-message {
        max-width: 680px;
        margin: 12vh auto;
        padding: 28px;
        border-radius: 24px;
        background: linear-gradient(180deg, #0f1115 0%, #141821 100%);
        border: 1px solid #252932;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      }

      .boot-message h1 {
        margin-top: 0;
        font-family: 'Space Grotesk', sans-serif;
      }

      .boot-message code {
        display: inline-block;
        margin: 4px 0;
        padding: 4px 8px;
        border-radius: 999px;
        background: #181b22;
        border: 1px solid #252932;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <h1>TapLink precisa do Vite</h1>
        <p>Se esta mensagem continuar aparecendo, o frontend provavelmente esta sendo servido como codigo-fonte bruto.</p>
        <p>Para executar a aplicacao corretamente, rode na raiz do projeto:</p>
        <p><code>npm install</code></p>
        <p><code>npm run dev:frontend</code></p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
