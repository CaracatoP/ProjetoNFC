<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#140d09" />
    <title>NFC Linktree SaaS</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <link rel="alternate icon" href="/src/assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: 'Manrope', sans-serif;
        background: #140d09;
        color: #fff8f2;
      }

      .boot-message {
        max-width: 720px;
        margin: 10vh auto;
        padding: 24px;
        border-radius: 24px;
        background: rgba(31, 20, 16, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
      }

      .boot-message h1 {
        margin-top: 0;
        font-family: 'Space Grotesk', sans-serif;
      }

      .boot-message code {
        display: inline-block;
        margin: 4px 0;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.18);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <h1>Frontend precisa do Vite</h1>
        <p>Se esta mensagem continuar aparecendo, o frontend provavelmente esta sendo servido como codigo-fonte bruto.</p>
        <p>Para executar a aplicacao corretamente, rode na raiz do projeto:</p>
        <p><code>npm install</code></p>
        <p><code>npm run dev:frontend</code></p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
